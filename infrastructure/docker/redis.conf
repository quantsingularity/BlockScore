# Redis configuration for BlockScore

# Persistence
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Security
protected-mode yes
bind 0.0.0.0

# Performance
tcp-keepalive 300
timeout 300
tcp-backlog 511

# Logging
loglevel notice
logfile ""

# Disable dangerous commands
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""
rename-command CONFIG ""
rename-command SHUTDOWN SHUTDOWN_BLOCKSCORE

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128
