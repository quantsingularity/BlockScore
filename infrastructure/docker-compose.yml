version: "3.9"

services:
  proxy:
    build:
      context: .
      dockerfile: docker/Dockerfile.proxy
    image: blockscore/proxy:latest
    container_name: blockscore-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - blockscore-net
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run/nginx
      - /tmp

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    image: blockscore/backend:latest
    container_name: blockscore-backend
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://appuser:${DB_PASSWORD:-changeme}@database:3306/blockscoredb
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-changeme-replace-in-production}
      PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    env_file:
      - path: docker/.env
        required: false
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - blockscore-net
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/cache

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        REACT_APP_API_URL: /api
        REACT_APP_ENV: production
    image: blockscore/frontend:latest
    container_name: blockscore-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - blockscore-net
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run/nginx
      - /tmp

  database:
    image: mysql:8.0
    container_name: blockscore-database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-changeme-root}
      MYSQL_DATABASE: blockscoredb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
    env_file:
      - path: docker/.env
        required: false
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "--password=${DB_ROOT_PASSWORD:-changeme-root}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - blockscore-net
    security_opt:
      - no-new-privileges:true
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=150
      --innodb-buffer-pool-size=256M
      --slow-query-log=1
      --slow-query-log-file=/var/lib/mysql/slow.log
      --long-query-time=2
      --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7.2-alpine
    container_name: blockscore-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - blockscore-net
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

networks:
  blockscore-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  db-data:
    driver: local
  redis-data:
    driver: local
