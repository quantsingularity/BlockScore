---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: "{{ .Values.appName }}-backend-pdb"
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: "{{ .Values.appName }}-backend"
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: "{{ .Values.appName }}-frontend-pdb"
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: "{{ .Values.appName }}-frontend"
