---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "{{ .Values.appName }}-database"
  labels:
    app: "{{ .Values.appName }}-database"
spec:
  serviceName: "{{ .Values.appName }}-database"
  replicas: { { .Values.database.replicas } }
  selector:
    matchLabels:
      app: "{{ .Values.appName }}-database"
  template:
    metadata:
      labels:
        app: "{{ .Values.appName }}-database"
    spec:
      securityContext:
        runAsNonRoot: false
        fsGroup: 999
      terminationGracePeriodSeconds: 60
      containers:
        - name: "{{ .Values.appName }}-database"
          image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"
          imagePullPolicy: "{{ .Values.database.image.pullPolicy }}"
          ports:
            - containerPort: { { .Values.database.containerPort } }
              name: mysql
          resources:
            limits:
              cpu: "{{ .Values.database.resources.limits.cpu }}"
              memory: "{{ .Values.database.resources.limits.memory }}"
            requests:
              cpu: "{{ .Values.database.resources.requests.cpu }}"
              memory: "{{ .Values.database.resources.requests.memory }}"
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.appName }}-secrets"
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: "{{ .Values.database.name }}"
            - name: MYSQL_USER
              value: "{{ .Values.database.user }}"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.appName }}-secrets"
                  key: mysql-password
          volumeMounts:
            - name: "{{ .Values.appName }}-database-data"
              mountPath: /var/lib/mysql
          livenessProbe:
            exec:
              command:
                - "sh"
                - "-c"
                - "mysqladmin ping -u root -p${MYSQL_ROOT_PASSWORD} 2>/dev/null"
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - "sh"
                - "-c"
                - "mysql -u root -p${MYSQL_ROOT_PASSWORD} -e 'SELECT 1' 2>/dev/null"
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - "sh"
                - "-c"
                - "mysqladmin ping -u root -p${MYSQL_ROOT_PASSWORD} 2>/dev/null"
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
  volumeClaimTemplates:
    - metadata:
        name: "{{ .Values.appName }}-database-data"
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "{{ .Values.database.storageClass }}"
        resources:
          requests:
            storage: "{{ .Values.database.storage }}"
