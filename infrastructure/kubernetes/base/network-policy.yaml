        - protocol: TCP
          port: 80
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: blockscore-backend
      ports:
        - protocol: TCP
          port: 8080
    - ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
---
