version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: blockscore_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blockscore}
      POSTGRES_USER: ${POSTGRES_USER:-blockscore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blockscore_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-blockscore} -d ${POSTGRES_DB:-blockscore}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - blockscore_net

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: blockscore_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test:
        ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - blockscore_net

  # ─── AI Model Server ──────────────────────────────────────────────────────
  ai_model:
    build:
      context: ./ai_models
      dockerfile: Dockerfile
    container_name: blockscore_ai
    restart: unless-stopped
    environment:
      PORT: 5001
      FLASK_ENV: ${FLASK_ENV:-production}
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - blockscore_net

  # ─── Backend API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blockscore_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai_model:
        condition: service_healthy
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-jwt-in-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-blockscore}:${POSTGRES_PASSWORD:-blockscore_password}@postgres:5432/${POSTGRES_DB:-blockscore}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      RATELIMIT_STORAGE_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/2
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/3
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      BLOCKCHAIN_PROVIDER_URL: ${BLOCKCHAIN_PROVIDER_URL:-http://localhost:8545}
      BLOCKCHAIN_FROM_ADDRESS: ${BLOCKCHAIN_FROM_ADDRESS:-}
      BLOCKCHAIN_PRIVATE_KEY: ${BLOCKCHAIN_PRIVATE_KEY:-}
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS:-0x0000000000000000000000000000000000000000}
      CREDIT_SCORE_CONTRACT_ADDRESS: ${CREDIT_SCORE_CONTRACT_ADDRESS:-}
      LOAN_AGREEMENT_CONTRACT_ADDRESS: ${LOAN_AGREEMENT_CONTRACT_ADDRESS:-}
      BCRYPT_LOG_ROUNDS: ${BCRYPT_LOG_ROUNDS:-12}
      RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT:-100 per hour}
      RATE_LIMIT_LOGIN: ${RATE_LIMIT_LOGIN:-5 per minute}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AI_MODEL_URL: http://ai_model:5001
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - blockscore_net

  # ─── Celery Worker ────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blockscore_celery
    restart: unless-stopped
    command: >
      celery -A utils.background_jobs worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=1000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-jwt-in-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-blockscore}:${POSTGRES_PASSWORD:-blockscore_password}@postgres:5432/${POSTGRES_DB:-blockscore}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/2
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/3
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    networks:
      - blockscore_net

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  backend_logs:

networks:
  blockscore_net:
    driver: bridge
